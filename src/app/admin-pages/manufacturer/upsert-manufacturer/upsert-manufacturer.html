<div class="modal d-block" tabindex="-1" style="background:rgba(0,0,0,0.4)">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">{{ isEditMode ? 'Edit Manufacturer' : 'New Manufacturer' }}</h5>
                <button type="button" class="btn-close" (click)="onClose()"></button>
            </div>
            <div class="modal-body">
                <form [formGroup]="form" (ngSubmit)="onSubmit()">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Company Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" formControlName="companyName"
                                placeholder="e.g. Picanol NV" [class.is-invalid]="companyName?.invalid && companyName?.touched" />
                            @if(companyName?.hasError('required') && companyName?.touched) {
                            <div class="invalid-feedback">Company name is required.</div>
                            }
                        </div>

                        <div class="col-12">
                            <label class="form-label">Status</label>
                            <select class="form-select" formControlName="isActive">
                                <option [ngValue]="true">Active</option>
                                <option [ngValue]="false">Inactive</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="button" class="btn btn-secondary" (click)="onClose()">Cancel</button>
                        <button type="submit" class="btn btn-primary" [disabled]="isReqAlive">
                            {{ isReqAlive ? 'Saving...' : (isEditMode ? 'Save Changes' : 'Create') }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
